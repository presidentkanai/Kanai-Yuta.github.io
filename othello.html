<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Deep Learning Othello | Yuta Kanai</title>
    <link rel="stylesheet" href="othello.css">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
    <div class="game-container">
        <h1>Deep Learning Othello</h1>
        <div id="status">AIモデルをロード中...</div>
        <div class="status-board">
            <div id="black-score">黒: 2</div>
            <div id="turn-display">黒の番</div>
            <div id="white-score">白: 2</div>
        </div>
        <div id="board" class="board"></div>
        <div class="controls">
            <button class="action-btn" onclick="location.reload()">リセット</button>
            <a href="index.html" class="action-btn back-btn">戻る</a>
        </div>
    </div>
    <script src="othello_dl.js"></script>
</body>
</html>
